server {
    port = 8080
    port = ${?PORT}
    host = "0.0.0.0"
    host = ${?HOST}
}

database {
    url = "jdbc:postgresql://localhost:5432/misuper"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
    maxPoolSize = ${?DATABASE_MAX_POOL_SIZE}
    migrateOnStart = true
    migrateOnStart = ${?DATABASE_MIGRATE_ON_START}
    seedOnStart = true
    seedOnStart = ${?DATABASE_SEED_ON_START}
}

jwt {
    secret = "super-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "misuper-backend"
    issuer = ${?JWT_ISSUER}
    audience = "misuper-app"
    audience = ${?JWT_AUDIENCE}
    accessExpirationMinutes = 15
    accessExpirationMinutes = ${?ACCESS_TOKEN_EXPIRY_MINUTES}
    refreshExpirationDays = 7
    refreshExpirationDays = ${?REFRESH_TOKEN_EXPIRY_DAYS}
}

password {
    hashCost = 12
    hashCost = ${?PASSWORD_HASH_COST}
    historySize = 5
    historySize = ${?PASSWORD_HISTORY_SIZE}
}

cors {
    allowedHosts = ["localhost:3000", "localhost:5173", "localhost:8081", "10.0.2.2:8080"]
    allowedHosts = ${?CORS_ALLOWED_HOSTS}
}
