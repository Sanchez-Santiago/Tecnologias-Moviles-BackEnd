server {
    port = 8080
    port = ${?PORT}
}

database {
    url = "jdbc:postgresql://localhost:5432/misuper"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "postgres"
    user = ${?DATABASE_USER}
    password = "postgres"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

jwt {
    secret = "super-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "misuper-backend"
    audience = "misuper-app"
    accessExpirationMinutes = 15
    refreshExpirationDays = 7
}

password {
    hashCost = 12
    historySize = 5
}
