services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: misuper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - postgres
    environment:
      PORT: 8080
      DATABASE_URL: jdbc:postgresql://postgres:5432/misuper
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_MIGRATE_ON_START: true
      DATABASE_SEED_ON_START: true
      JWT_SECRET: change-me-to-a-random-256-bit-secret-change-before-production
      CORS_ALLOWED_HOSTS: '["localhost:3000","localhost:5173","10.0.2.2:8080"]'
    ports:
      - "8080:8080"

volumes:
  postgres_data:
